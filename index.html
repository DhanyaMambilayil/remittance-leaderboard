<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporate Desk Dashboard</title>

<!--
  =====================================================================
  ABOUT THIS FILE
  =====================================================================
  This is a SAMPLE build with your uploaded Corporate.xlsx data embedded
  directly below (search for "EMBEDDED SAMPLE DATA"). It is meant for
  review — once the layout/metrics are approved, this gets converted to
  pull live from a published Google Sheet CSV (same pattern as your
  other dashboard), and the embedded block gets removed.

  ASSUMPTIONS MADE WHILE BUILDING THIS — please confirm or correct:
  1. Periods are bucketed by the "Month" text column (JAN, FEB, ...),
     not the "Date" column — the Date column didn't match the Month
     label for many rows in the sample (e.g. rows labeled "JAN" had
     Date values in March/April), so Month was treated as the source
     of truth for which period a transaction belongs to.
  2. "Volume" = sum of Local Amount (assumed to be KWD-equivalent,
     comparable across currencies).
  3. "Current month" = the most recent month present in the data, not
     necessarily today's calendar month — since sample data may lag.
  4. New customers are sample-tagged, not derived from real data: a
     fixed count per RM per month (as specified) was assigned to a
     deterministic, randomly-chosen set of that RM's active customers
     for that month. Replace this with a real "new customer" flag from
     the live sheet once available.
  5. "Profit" was replaced with Total Revenue everywhere, including the
     RM-performance-by-currency panel, per your latest request.
  6. The "Current Month" tab label always shows the actual latest month
     present in the data (currently June) — it will automatically say
     "July MTD" once July data is added, no code changes needed.
  =====================================================================
-->

    document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"><\/script>');

<style>
  :root{
    --bg:#181F39; --panel:#1E2746; --ink:#EAEFF9; --ink-soft:#8891AC; --line:#2A3560;
    --navy:#22335E;
    --accent:#3A7AFE; --accent-soft:#233258;
    --blue:#3A7AFE; --blue-soft:#1E2E52;
    --gold:#10CA93; --gold-soft:#173C34;
    --purple:#00AFEF; --purple-soft:#123449;
    --positive:#10CA93; --positive-soft:#173C34;
    --red:#FF5C5C; --red-soft:#3A1B1B;
    --orange:#FF8A3D;
    --radius:12px;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --display:'Space Grotesk', var(--sans);
  }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg) radial-gradient(circle at 15% 0%, var(--blue-soft) 0%, transparent 50%), radial-gradient(circle at 100% 5%, var(--gold-soft) 0%, transparent 22%);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1260px;margin:0 auto;padding:28px 20px 64px;}

  header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:18px;}
  .title-block h1{
    font-family:var(--display);font-weight:700;font-size:26px;letter-spacing:-0.02em;margin:0 0 4px;
    color:#001844;text-shadow:0 0 1px #fff, 0 0 14px rgba(255,255,255,.55);
  }
  .title-block p{margin:0;color:var(--ink-soft);font-size:14px;}
  .badge{
    display:inline-flex;align-items:center;gap:8px;background:var(--gold-soft);color:var(--gold);
    border:1px solid #1E5C4A;border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600;
  }

  .note{background:var(--accent-soft);border:1px solid #2E3E5C;color:var(--ink);border-radius:var(--radius);padding:13px 16px;font-size:13px;line-height:1.55;margin-bottom:22px;}
  .note b{font-weight:700;}

  /* ---- Tabs ---- */
  .tabs{display:flex;gap:8px;margin-bottom:20px;}
  .tab-btn{
    border:1px solid #001844;background:#fff;color:#001844;
    font-family:var(--display);font-weight:600;font-size:14px;
    padding:11px 22px;border-radius:999px;cursor:pointer;
  }
  .tab-btn.active{background:#001844;color:#fff;border-color:#001844;box-shadow:0 0 26px rgba(58,122,254,.45);}

  /* ---- Cards ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:0 2px 14px rgba(0,27,84,.05);}
  .card .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:8px;font-weight:600;}
  .card .value{font-family:var(--mono);font-size:23px;font-weight:600;letter-spacing:-0.01em;}
  .card .sub{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .card .sub.up{color:var(--positive);}
  .card .sub.down{color:var(--red);}

  .card.grad-0{background:#3A7AFE;border-color:transparent;box-shadow:0 0 26px rgba(58,122,254,.40);}
  .card.grad-1{background:#10CA93;border-color:transparent;box-shadow:0 0 26px rgba(16,202,147,.35);}
  .card.grad-2{background:#00AFEF;border-color:transparent;box-shadow:0 0 26px rgba(0,175,239,.35);}
  .card.grad-3{background:#7C5CFC;border-color:transparent;box-shadow:0 0 26px rgba(124,92,252,.35);}
  .card.grad-4{background:#5B8FBF;border-color:transparent;box-shadow:0 0 26px rgba(91,143,191,.30);}
  .card[class*="grad-"] .label{color:rgba(255,255,255,.78);}
  .card[class*="grad-"] .value{color:#fff;}
  .card[class*="grad-"] .sub{color:rgba(255,255,255,.75);}
  .card[class*="grad-"] .sub.up{color:#082418;font-weight:700;}
  .card[class*="grad-"] .sub.down{color:#2E0808;font-weight:700;}

  /* ---- Panels ---- */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
  .panel h2{font-family:var(--display);font-size:19px;font-weight:700;color:var(--orange);text-shadow:0 0 14px rgba(255,138,61,.45);letter-spacing:-0.01em;margin:0 0 16px;padding-left:12px;border-left:4px solid var(--orange);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .panel h2.accordion-head{cursor:pointer;margin:0;}
  .accordion-icon{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    background:var(--orange);color:#3A1F00;font-size:16px;font-weight:700;
    box-shadow:0 0 14px rgba(255,138,61,.5);
  }
  .panel-body{margin-top:16px;}
  .panel-body.collapsed{display:none;}
  .panel h2 .hint{font-family:var(--sans);font-weight:500;font-size:12px;color:var(--ink-soft);}
  .chart-wrap{position:relative;height:300px;}
  .chart-wrap.tall{height:340px;}

  /* ---- Leaderboard ---- */
  .lb-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .lb-col-title{font-family:var(--display);font-weight:600;font-size:13px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;}
  .lb-card{
    display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;
    border:1px solid var(--line);margin-bottom:10px;background:var(--panel);
    transition:box-shadow .15s ease;
  }
  .lb-card.rank-1{border-color:#1E5C4A;box-shadow:0 0 26px rgba(16,202,147,.30);}
  .lb-card.rank-2{box-shadow:0 0 16px rgba(0,27,84,.10);}
  .lb-rank{
    width:36px;height:36px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--display);font-weight:700;font-size:15px;
  }
  .lb-rank.r1{background:var(--gold);color:#fff;box-shadow:0 0 18px rgba(16,202,147,.65);}
  .lb-rank.r2{background:#3A4560;color:#DCE3F0;}
  .lb-rank.r3{background:#5A4326;color:#F0DDBB;}
  .lb-rank.rn{background:var(--accent-soft);color:var(--ink);}
  .lb-body{flex:1;min-width:0;}
  .lb-top-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .lb-name{font-weight:700;font-family:var(--display);font-size:14.5px;color:var(--ink);}
  .lb-value{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--ink);white-space:nowrap;}
  .lb-sub{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .lb-bar-wrap{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:8px;}
  .lb-bar-fill{height:100%;border-radius:999px;width:0;transition:width 1.1s cubic-bezier(.2,.7,.2,1);}
  @media (max-width:640px){ .lb-grid{grid-template-columns:1fr;} }

  /* ---- Pill switchers ---- */
  .pill-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .pill-btn{
    border:1px solid var(--line);background:var(--bg);color:var(--ink-soft);
    font-family:var(--sans);font-weight:600;font-size:12.5px;
    padding:8px 14px;border-radius:999px;cursor:pointer;
  }
  .pill-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 16px rgba(58,122,254,.40);}
  .pill-btn.gold.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 18px rgba(58,122,254,.40);}

  /* ---- Tables ---- */
  .table-scroll{overflow:auto;border:1px solid var(--line);border-radius:8px;}
  table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:640px;}
  thead th{position:sticky;top:0;background:#1A2338;text-align:right;padding:10px 12px;font-weight:600;border-bottom:1px solid var(--line);white-space:nowrap;}
  thead th:first-child{text-align:left;}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;font-family:var(--mono);font-size:12px;text-align:right;color:var(--ink);}
  tbody td:first-child{text-align:left;font-family:var(--sans);font-weight:600;}
  tbody tr:hover td{background:var(--accent-soft);}
  tbody tr.total-row td{background:#1A2338;font-weight:700;}
  tbody tr:last-child td{border-bottom:none;}

  footer{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:32px;}

  @media (max-width:600px){
    .title-block h1{font-size:21px;}
    .card .value{font-size:19px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1>Corporate Desk Dashboard</h1>
      <p>RM performance &amp; currency mix — Corporate Department</p>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>

  <section class="cards" id="cards"></section>

  <section class="panel">
    <h2>
      RM Leaderboard
      <span class="hint" id="lbHint"></span>
    </h2>
    <div class="pill-row" id="lbMetricRow"></div>
    <div id="lbList"></div>
  </section>

  <section class="panel" id="trendPanel">
    <h2 class="accordion-head" onclick="toggleSection('trend')">
      <span>Monthly trend</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span class="hint" id="trendHint"></span>
        <span class="accordion-icon" id="trendIcon">+</span>
      </span>
    </h2>
    <div class="panel-body collapsed" id="trendBody">
      <div class="pill-row" id="trendMetricRow"></div>
      <div class="pill-row" id="trendBdoRow"></div>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
  </section>

  <section class="panel">
    <h2 class="accordion-head" onclick="toggleSection('bdo')">
      <span>RM comparison</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span class="hint" id="bdoHint"></span>
        <span class="accordion-icon" id="bdoIcon">+</span>
      </span>
    </h2>
    <div class="panel-body collapsed" id="bdoBody">
      <div class="pill-row" id="bdoMetricRow"></div>
      <div class="chart-wrap"><canvas id="bdoChart"></canvas></div>
      <div class="table-scroll" style="margin-top:16px;">
        <table id="bdoTable">
          <thead><tr id="bdoTableHead"></tr></thead>
          <tbody id="bdoTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2 class="accordion-head" onclick="toggleSection('cur')">
      <span>Currency-wise comparison</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span class="hint" id="curHint"></span>
        <span class="accordion-icon" id="curIcon">+</span>
      </span>
    </h2>
    <div class="panel-body collapsed" id="curBody">
      <div class="pill-row" id="curBdoRow"></div>
      <div class="pill-row" id="curMetricRow"></div>
      <div class="chart-wrap"><canvas id="curChart"></canvas></div>
      <div class="table-scroll" style="margin-top:16px;">
        <table id="curTable">
          <thead><tr id="curTableHead"></tr></thead>
          <tbody id="curTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2 class="accordion-head" onclick="toggleSection('rmCur')">
      <span>RM performance by currency</span>
      <span style="display:flex;align-items:center;gap:10px;">
        <span class="hint" id="rmCurHint"></span>
        <span class="accordion-icon" id="rmCurIcon">+</span>
      </span>
    </h2>
    <div class="panel-body collapsed" id="rmCurBody">
      <div class="pill-row" id="rmCurMetricRow"></div>
      <div class="pill-row" id="rmCurRmRow"></div>
      <div class="pill-row" id="rmCurTabs"></div>
      <div class="chart-wrap"><canvas id="rmCurChart"></canvas></div>
      <div class="table-scroll" style="margin-top:16px;">
        <table id="rmCurTable">
          <thead><tr id="rmCurTableHead"></tr></thead>
          <tbody id="rmCurTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>
</div>

// The source data doesn't distinguish new vs. existing customers, so a fixed
// number of customers are tagged "new" per RM per month, as specified:
//   CHERIAN: Jan 3, Feb 2, Mar 2, Apr 3, May 3, Jun 2
//   JOBY:    Jan 2, Feb 2, Mar 4, Apr 2, May 1, Jun 1
// Selection is deterministic (seeded), not re-randomized on reload.
const NEW_CUSTOMER_COUNTS = {
  CHERIAN: { JAN:3, FEB:2, MAR:2, APR:3, MAY:3, JUN:2 },
  JOBY:    { JAN:2, FEB:2, MAR:4, APR:2, MAY:1, JUN:1 }
};
function hashSeed(str){ let h = 0; for (let i=0;i<str.length;i++) h = (h*31 + str.charCodeAt(i)) | 0; return h; }
function seededRandom(seed){
  let t = seed;
  return function(){
    t |= 0; t = (t + 0x6D2B79F5) | 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}
const newCustomerSet = new Set(); // "sid|mo"
Object.keys(NEW_CUSTOMER_COUNTS).forEach(rm => {
  Object.keys(NEW_CUSTOMER_COUNTS[rm]).forEach(mo => {
    const n = NEW_CUSTOMER_COUNTS[rm][mo];
    const candidates = [...new Set(DATA.filter(r => r.bdo === rm && r.mo === mo).map(r => r.sid))];
    const rand = seededRandom(hashSeed(rm + '-' + mo));
    const shuffled = candidates.map(v => ({ v, k: rand() })).sort((a,b) => a.k - b.k).map(x => x.v);
    shuffled.slice(0, n).forEach(sid => newCustomerSet.add(sid + '|' + mo));
  });
});

// ---- Derived lookups ----
const monthsPresent = [...new Set(DATA.map(r => r.mo))].sort((a,b) => MONTH_ORDER.indexOf(a) - MONTH_ORDER.indexOf(b));
const latestMonth = monthsPresent[monthsPresent.length - 1];
const prevMonth = monthsPresent.length > 1 ? monthsPresent[monthsPresent.length - 2] : null;

const bdoList = [...new Set(DATA.map(r => r.bdo))].sort((a,b) => {
  const ca = DATA.filter(r => r.bdo === a).length, cb = DATA.filter(r => r.bdo === b).length;
  return cb - ca;
});

let currentTab = 'cm';        // 'cm' | 'ytd' — Current Month is the default landing tab
let trendMetric = 'rev';
let trendBdos = new Set(['ALL', ...bdoList]);
let bdoMetric = 'rev';
let curBdoFilter = 'ALL';
let curMetric = 'rev';        // Volume / Revenue toggle for the Currency-wise comparison chart
let rmCurMetric = 'rev';      // Volume / Revenue sub-tab for RM performance by currency
let rmCurSelected = new Set(); // multi-selected currencies for RM performance by currency
let rmCurRmSelected = null; // multi-selected RMs for RM performance by currency (init lazily once bdoList known)
let lbMetric = 'rev';         // Volume / Revenue toggle for the leaderboard

const METRIC_META = {
  amt:    { label: 'Volume',           fmt: v => fmtCurrency(v) },
  rev:    { label: 'Total Revenue',    fmt: v => fmtCurrency(v) },
  count:  { label: 'Transactions',     fmt: v => v.toLocaleString() },
  active: { label: 'Active Customers', fmt: v => v.toLocaleString() },
  newc:   { label: 'New Customers',    fmt: v => v.toLocaleString() }
};

function fmtCurrency(v){
  return v.toLocaleString(undefined, { maximumFractionDigits: 0 });
}
function fmtPct(n){
  if (n === null || n === undefined || isNaN(n)) return 'N/A';
  const sign = n > 0 ? '+' : '';
  return sign + n.toFixed(1) + '%';
}

function periodMonths(){
  return currentTab === 'ytd' ? monthsPresent : [latestMonth];
}
function compareMonths(){
  return currentTab === 'ytd' ? [] : (prevMonth ? [prevMonth] : []);
}

function filterRecords(months, bdo){
  return DATA.filter(r => months.includes(r.mo) && (!bdo || bdo === 'ALL' || r.bdo === bdo));
}

function aggregate(records){
  const sids = new Set(), newSids = new Set();
  let amt = 0, profit = 0, comm = 0, rev = 0;
  records.forEach(r => {
    amt += r.amt; profit += r.profit; comm += r.comm; rev += r.rev;
    sids.add(r.sid);
    if (newCustomerSet.has(r.sid + '|' + r.mo)) newSids.add(r.sid);
  });
  return { amt, profit, comm, rev, count: records.length, active: sids.size, newc: newSids.size };
}

/* ---------- Tabs ---------- */
function buildTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  [['cm', `${MONTH_FULL[latestMonth]} MTD`], ['ytd','Year to Date']].forEach(([key,label]) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (key === currentTab ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { currentTab = key; renderAll(); };
    el.appendChild(btn);
  });
}

/* ---------- Cards ---------- */
function renderCards(){
  const months = periodMonths();
  const cmp = compareMonths();
  const cur = aggregate(filterRecords(months));
  const prev = cmp.length ? aggregate(filterRecords(cmp)) : null;

  const defs = [
    ['amt', 'Volume'], ['rev', 'Total Revenue'], ['count', 'Transactions'],
    ['active', 'Active Customers'], ['newc', 'New Customers']
  ];

  const el = document.getElementById('cards');
  el.innerHTML = defs.map(([key, label], i) => {
    const val = cur[key];
    let sub = `${months.length} month${months.length > 1 ? 's' : ''}`;
    let subClass = '';
    if (prev){
      const delta = prev[key] !== 0 ? ((val - prev[key]) / Math.abs(prev[key]) * 100) : null;
      sub = 'vs ' + MONTH_FULL[prevMonth] + ': ' + fmtPct(delta);
      subClass = delta > 0 ? 'up' : delta < 0 ? 'down' : '';
    }
    return `
      <div class="card grad-${i % 5}">
        <div class="label">${label}</div>
        <div class="value">${METRIC_META[key].fmt(val)}</div>
        <div class="sub ${subClass}">${sub}</div>
      </div>`;
  }).join('');
}

/* ---------- RM Leaderboard (MTD + YTD, always both shown) ---------- */
function renderLbList(containerId, months){
  const rows = bdoList
    .map(rm => ({ rm, ...aggregate(filterRecords(months, rm)) }))
    .sort((a,b) => b[lbMetric] - a[lbMetric]);
  const maxVal = rows.length ? rows[0][lbMetric] : 0;
  const rankClass = i => i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
  const cardClass = i => i === 0 ? ' rank-1' : i === 1 ? ' rank-2' : '';
  const barColor = i => i === 0 ? 'var(--gold)' : 'var(--blue)';

  const container = document.getElementById(containerId);
  container.innerHTML = rows.map((r, i) => `
    <div class="lb-card${cardClass(i)}">
      <div class="lb-rank ${rankClass(i)}">${i+1}</div>
      <div class="lb-body">
        <div class="lb-top-row">
          <span class="lb-name">${r.rm}</span>
          <span class="lb-value">${METRIC_META[lbMetric].fmt(r[lbMetric])}</span>
        </div>
        <div class="lb-sub">${r.count.toLocaleString()} txns · ${r.active.toLocaleString()} active · ${r.newc.toLocaleString()} new</div>
        <div class="lb-bar-wrap"><div class="lb-bar-fill" data-target="${maxVal ? (r[lbMetric]/maxVal*100) : 0}" style="width:0%;background:${barColor(i)};"></div></div>
      </div>
    </div>`).join('');

  // Animate bars left-to-right: start at 0 width (set above), then flip to the
  // real width on the next frame so the CSS transition actually plays.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      container.querySelectorAll('.lb-bar-fill').forEach(el => {
        el.style.width = el.dataset.target + '%';
      });
    });
  });
}

function renderLeaderboard(){
  const months = periodMonths();
  const periodLabel = currentTab === 'ytd' ? 'Year to Date' : `${MONTH_FULL[latestMonth]} MTD`;
  document.getElementById('lbHint').textContent = `${periodLabel} · ${METRIC_META[lbMetric].label} ranking`;

  const metricRow = document.getElementById('lbMetricRow');
  metricRow.innerHTML = '';
  [['amt','Volume'], ['rev','Total Revenue']].forEach(([key,label]) => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn gold' + (lbMetric === key ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { lbMetric = key; renderLeaderboard(); };
    metricRow.appendChild(btn);
  });

  renderLbList('lbList', months);
}

/* ---------- Monthly trend (YTD only) ---------- */
let trendChartInstance = null;
function renderTrendPanel(){
  const panel = document.getElementById('trendPanel');
  if (currentTab !== 'ytd'){ panel.style.display = 'none'; return; }
  panel.style.display = 'block';

  document.getElementById('trendHint').textContent = `${monthsPresent.length} months`;

  const metricRow = document.getElementById('trendMetricRow');
  metricRow.innerHTML = '';
  ['amt','rev','active','newc'].forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn' + (trendMetric === key ? ' active' : '');
    btn.textContent = METRIC_META[key].label;
    btn.onclick = () => { trendMetric = key; renderTrendPanel(); };
    metricRow.appendChild(btn);
  });

  const bdoRow = document.getElementById('trendBdoRow');
  bdoRow.innerHTML = '';
  ['ALL', ...bdoList].forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn gold' + (trendBdos.has(b) ? ' active' : '');
    btn.textContent = b === 'ALL' ? 'Corporate Total' : b;
    btn.onclick = () => {
      if (trendBdos.has(b)) trendBdos.delete(b); else trendBdos.add(b);
      renderTrendPanel();
    };
    bdoRow.appendChild(btn);
  });

  const labels = monthsPresent.map(m => MONTH_FULL[m].slice(0,3));
  const series = ['ALL', ...bdoList].filter(b => trendBdos.has(b)).map((b) => {
    const data = monthsPresent.map(m => aggregate(filterRecords([m], b === 'ALL' ? null : b))[trendMetric]);
    const color = b === 'ALL' ? '#012563' : PALETTE[(bdoList.indexOf(b) + 1) % PALETTE.length];
    return {
      label: b === 'ALL' ? 'Corporate Total' : b,
      data,
      borderColor: color, backgroundColor: color,
      borderWidth: b === 'ALL' ? 2.5 : 2,
      pointRadius: 0, tension: 0.25
    };
  });

  const ctx = document.getElementById('trendChart').getContext('2d');
  if (trendChartInstance) trendChartInstance.destroy();
  trendChartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: series },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top', onClick: () => {}, labels: { color: '#EAEFF9', boxWidth: 10, font: { family: 'Inter', size: 11 } } },
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#8A93AA', font: { family: 'Inter', size: 11 } } },
        y: { grid: { color: '#242E47' }, ticks: { color: '#8A93AA', font: { family: 'JetBrains Mono', size: 10 } } }
      }
    }
  });
}

/* ---------- RM comparison ---------- */
let bdoChartInstance = null;
function renderBdoPanel(){
  const months = periodMonths();
  document.getElementById('bdoHint').textContent = currentTab === 'ytd' ? 'Year to date' : MONTH_FULL[latestMonth];

  const metricRow = document.getElementById('bdoMetricRow');
  metricRow.innerHTML = '';
  Object.keys(METRIC_META).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn' + (bdoMetric === key ? ' active' : '');
    btn.textContent = METRIC_META[key].label;
    btn.onclick = () => { bdoMetric = key; renderBdoPanel(); };
    metricRow.appendChild(btn);
  });

  const rows = bdoList.map(b => ({ bdo: b, ...aggregate(filterRecords(months, b)) }));
  const corpTotal = aggregate(filterRecords(months));

  const ctx = document.getElementById('bdoChart').getContext('2d');
  if (bdoChartInstance) bdoChartInstance.destroy();
  bdoChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: rows.map(r => r.bdo),
      datasets: [{
        data: rows.map(r => r[bdoMetric]),
        backgroundColor: rows.map((_,i) => PALETTE[i % PALETTE.length]),
        borderRadius: 4, maxBarThickness: 60
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => METRIC_META[bdoMetric].fmt(c.parsed.y) } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#8A93AA', font: { family: 'Inter', size: 12, weight: '600' } } },
        y: { grid: { color: '#242E47' }, ticks: { color: '#8A93AA', font: { family: 'JetBrains Mono', size: 10 } } }
      }
    }
  });

  const head = document.getElementById('bdoTableHead');
  head.innerHTML = '<th>RM</th>' + Object.keys(METRIC_META).map(k => `<th>${METRIC_META[k].label}</th>`).join('');
  const body = document.getElementById('bdoTableBody');
  body.innerHTML = rows.map(r => `<tr><td>${r.bdo}</td>${Object.keys(METRIC_META).map(k => `<td>${METRIC_META[k].fmt(r[k])}</td>`).join('')}</tr>`).join('')
    + `<tr class="total-row"><td>Corporate Total</td>${Object.keys(METRIC_META).map(k => `<td>${METRIC_META[k].fmt(corpTotal[k])}</td>`).join('')}</tr>`;
}

/* ---------- Currency-wise comparison (Volume & Revenue) ---------- */
let curChartInstance = null;
function renderCurrencyPanel(){
  const months = periodMonths();
  document.getElementById('curHint').textContent = currentTab === 'ytd' ? 'Year to date' : MONTH_FULL[latestMonth];

  const bdoRow = document.getElementById('curBdoRow');
  bdoRow.innerHTML = '';
  ['ALL', ...bdoList].forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn' + (curBdoFilter === b ? ' active' : '');
    btn.textContent = b === 'ALL' ? 'Corporate Total (All RMs)' : b;
    btn.onclick = () => { curBdoFilter = b; renderCurrencyPanel(); };
    bdoRow.appendChild(btn);
  });

  const metricRow = document.getElementById('curMetricRow');
  metricRow.innerHTML = '';
  [['amt','Volume'], ['rev','Total Revenue']].forEach(([key,label]) => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn gold' + (curMetric === key ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { curMetric = key; renderCurrencyPanel(); };
    metricRow.appendChild(btn);
  });

  const records = filterRecords(months, curBdoFilter);
  const byCur = {};
  records.forEach(r => {
    if (!byCur[r.cur]) byCur[r.cur] = { cur: r.cur, amt: 0, rev: 0, count: 0 };
    const c = byCur[r.cur];
    c.amt += r.amt; c.rev += r.rev; c.count += 1;
  });
  const rows = Object.values(byCur).sort((a,b) => b[curMetric] - a[curMetric]);
  const metricLabel = curMetric === 'amt' ? 'Volume' : 'Total Revenue';

  const ctx = document.getElementById('curChart').getContext('2d');
  const top = rows.slice(0, 10);
  if (curChartInstance) curChartInstance.destroy();
  curChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top.map(r => r.cur),
      datasets: [{
        data: top.map(r => r[curMetric]),
        backgroundColor: top.map((_,i) => PALETTE[i % PALETTE.length]),
        borderRadius: 4, maxBarThickness: 40
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => metricLabel + ': ' + fmtCurrency(c.parsed.y) } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#8A93AA', font: { family: 'Inter', size: 11 } } },
        y: { grid: { color: '#242E47' }, ticks: { color: '#8A93AA', font: { family: 'JetBrains Mono', size: 10 } } }
      }
    }
  });

  const head = document.getElementById('curTableHead');
  head.innerHTML = '<th>Currency</th><th>Txns</th><th>Volume</th><th>Total Revenue</th>';
  const body = document.getElementById('curTableBody');
  const deptTotals = rows.reduce((a,r) => ({ amt:a.amt+r.amt, rev:a.rev+r.rev, count:a.count+r.count }), { amt:0, rev:0, count:0 });
  body.innerHTML = rows.map(r => `
    <tr>
      <td>${r.cur}</td>
      <td>${r.count.toLocaleString()}</td>
      <td>${fmtCurrency(r.amt)}</td>
      <td>${fmtCurrency(r.rev)}</td>
    </tr>`).join('')
    + `<tr class="total-row"><td>All Currencies</td><td>${deptTotals.count.toLocaleString()}</td><td>${fmtCurrency(deptTotals.amt)}</td><td>${fmtCurrency(deptTotals.rev)}</td></tr>`;
}

/* ---------- RM performance by currency (top 10 currencies, multi-select, Volume/Revenue) ---------- */
let rmCurChartInstance = null;
function topCurrencies(months){
  const byCur = {};
  DATA.filter(r => months.includes(r.mo)).forEach(r => {
    byCur[r.cur] = (byCur[r.cur] || 0) + r.amt;
  });
  return Object.entries(byCur).sort((a,b) => b[1] - a[1]).slice(0, 10).map(e => e[0]);
}

function renderRmCurrencyPanel(){
  const months = periodMonths();
  const topCurs = topCurrencies(months);

  // Default selection: top 3 currencies, the first time this renders (or if a
  // previously selected currency has fallen out of the top 10 for this period).
  rmCurSelected = new Set([...rmCurSelected].filter(c => topCurs.includes(c)));
  if (!rmCurSelected.size) topCurs.slice(0, 3).forEach(c => rmCurSelected.add(c));

  if (!rmCurRmSelected) rmCurRmSelected = new Set(bdoList);

  document.getElementById('rmCurHint').textContent = (currentTab === 'ytd' ? 'Year to date' : MONTH_FULL[latestMonth]) + ' · Top 10 currencies by volume';

  const metricRow = document.getElementById('rmCurMetricRow');
  metricRow.innerHTML = '';
  [['amt','Volume'], ['rev','Total Revenue']].forEach(([key,label]) => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn' + (rmCurMetric === key ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { rmCurMetric = key; renderRmCurrencyPanel(); };
    metricRow.appendChild(btn);
  });

  const rmRow = document.getElementById('rmCurRmRow');
  rmRow.innerHTML = '';
  bdoList.forEach((rm, i) => {
    const btn = document.createElement('button');
    const color = PALETTE[i % PALETTE.length];
    const isOn = rmCurRmSelected.has(rm);
    btn.className = 'pill-btn' + (isOn ? ' active' : '');
    if (isOn) btn.style.cssText = `background:${color};border-color:${color};box-shadow:0 0 16px ${color}66;`;
    btn.textContent = rm;
    btn.onclick = () => {
      if (rmCurRmSelected.has(rm)) rmCurRmSelected.delete(rm); else rmCurRmSelected.add(rm);
      if (!rmCurRmSelected.size) rmCurRmSelected.add(rm); // keep at least one selected
      renderRmCurrencyPanel();
    };
    rmRow.appendChild(btn);
  });

  const tabsEl = document.getElementById('rmCurTabs');
  tabsEl.innerHTML = '';
  topCurs.forEach(cur => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn gold' + (rmCurSelected.has(cur) ? ' active' : '');
    btn.textContent = cur;
    btn.onclick = () => {
      if (rmCurSelected.has(cur)) rmCurSelected.delete(cur); else rmCurSelected.add(cur);
      if (!rmCurSelected.size) rmCurSelected.add(cur); // keep at least one selected
      renderRmCurrencyPanel();
    };
    tabsEl.appendChild(btn);
  });

  const selectedCurs = topCurs.filter(c => rmCurSelected.has(c));
  const selectedRms = bdoList.filter(rm => rmCurRmSelected.has(rm));
  const metricLabel = rmCurMetric === 'amt' ? 'Volume' : 'Total Revenue';

  const rows = []; // { rm, cur, amt, rev, count }
  selectedCurs.forEach(cur => {
    bdoList.forEach(rm => {
      const records = DATA.filter(r => months.includes(r.mo) && r.bdo === rm && r.cur === cur);
      rows.push({
        rm, cur,
        amt: records.reduce((a,r) => a + r.amt, 0),
        rev: records.reduce((a,r) => a + r.rev, 0),
        count: records.length
      });
    });
  });

  const ctx = document.getElementById('rmCurChart').getContext('2d');
  if (rmCurChartInstance) rmCurChartInstance.destroy();
  rmCurChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: selectedCurs,
      datasets: selectedRms.map((rm) => ({
        label: rm,
        data: selectedCurs.map(cur => (rows.find(r => r.rm === rm && r.cur === cur) || {})[rmCurMetric] || 0),
        backgroundColor: PALETTE[bdoList.indexOf(rm) % PALETTE.length],
        borderRadius: 4, maxBarThickness: 40
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', onClick: () => {}, labels: { color: '#EAEFF9', boxWidth: 10, font: { family: 'Inter', size: 11 } } },
        tooltip: { callbacks: { label: c => `${c.dataset.label} ${metricLabel}: ${fmtCurrency(c.parsed.y)}` } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: '#8A93AA', font: { family: 'Inter', size: 12, weight: '600' } } },
        y: { grid: { color: '#242E47' }, ticks: { color: '#8A93AA', font: { family: 'JetBrains Mono', size: 10 } }, title: { display: true, text: metricLabel, color: '#8A93AA', font: { size: 10 } } }
      }
    }
  });

  const head = document.getElementById('rmCurTableHead');
  head.innerHTML = `<th>RM</th><th>Currency</th><th>Txns</th><th>Volume</th><th>Total Revenue</th>`;
  const body = document.getElementById('rmCurTableBody');
  const visibleRows = rows.filter(r => rmCurRmSelected.has(r.rm));
  const totals = visibleRows.reduce((a,r) => ({ amt:a.amt+r.amt, rev:a.rev+r.rev, count:a.count+r.count }), { amt:0, rev:0, count:0 });
  body.innerHTML = visibleRows.map(r => `
    <tr><td>${r.rm}</td><td>${r.cur}</td><td>${r.count.toLocaleString()}</td><td>${fmtCurrency(r.amt)}</td><td>${fmtCurrency(r.rev)}</td></tr>
  `).join('')
    + `<tr class="total-row"><td>Corporate Total</td><td>Selected currencies</td><td>${totals.count.toLocaleString()}</td><td>${fmtCurrency(totals.amt)}</td><td>${fmtCurrency(totals.rev)}</td></tr>`;
}

function toggleSection(key){
  const body = document.getElementById(key + 'Body');
  const icon = document.getElementById(key + 'Icon');
  const collapsing = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed');
  icon.textContent = collapsing ? '+' : '\u2212';
  if (!collapsing){
    // Chart.js needs the canvas to be visible (non-zero size) to size correctly,
    // so re-render the chart the moment its panel is expanded.
    if (key === 'trend') renderTrendPanel();
    if (key === 'bdo') renderBdoPanel();
    if (key === 'cur') renderCurrencyPanel();
    if (key === 'rmCur') renderRmCurrencyPanel();
  }
}

function renderAll(){
  buildTabs();
  renderCards();
  renderLeaderboard();
  renderTrendPanel();
  renderBdoPanel();
  renderCurrencyPanel();
  renderRmCurrencyPanel();
}


renderAll();
</script>
